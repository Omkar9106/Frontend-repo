# Render.com Deployment Configuration
# This file configures the FastAPI backend for production deployment

services:
  # FastAPI Web Service
  - type: web
    name: ai-health-surveillance-api
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: 10000
      - key: RENDER
        value: "true"
      
    # Health check
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 10
    healthCheckGracePeriod: 60
    
    # Auto-deploy settings
    autoDeploy: true
    
    # Build and runtime settings
    buildFilter:
      paths:
        - backend/**
        - backend/requirements.txt
        - backend/build.sh
        - backend/main.py
        - backend/scan_endpoints.py
        - backend/history_endpoint.py
        - backend/medicines_endpoint.py
        
    # Disk and memory
    disk:
      name: ai-health-surveillance-disk
      sizeGB: 1
      
    # Scaling
    scaling:
      minInstances: 1
      maxInstances: 1
      targetMemoryPercent: 70
      targetCPUPercent: 70

# Optional: Add a PostgreSQL database if needed
databases:
  - name: ai-health-surveillance-db
    databaseName: ai_health_surveillance
    user: ai_health_user
